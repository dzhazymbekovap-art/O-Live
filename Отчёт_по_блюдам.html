function fd(s){const[y,m,d]=s.split('-');return d+'.'+m+'.'+y;}
function fc(n){return n==null?'—':(n<0?'-':'')+Math.abs(Math.round(n||0)).toLocaleString('ru-RU')+' ₸';}
function avg(arr){return arr.length?Math.round(arr.reduce((a,b)=>a+b,0)/arr.length):0;}

const dates=[...new Set(D.map(r=>r.date))].sort();
const fdEl=document.getElementById('fd');
dates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=fd(d);fdEl.appendChild(o);});

function filt(){
  const s=document.getElementById('si').value.toLowerCase();
  const df=fdEl.value, mf=document.getElementById('fm').value;
  return D.filter(r=>
    (!s||r.client.toLowerCase().includes(s))&&
    (!df||r.date===df)&&
    (!mf||(mf==='pos'?r.margin>=0:mf==='neg'?r.margin<0:true))
  );
}

function render(){
  const F=filt();
  const revs=F.filter(r=>r.daily_rev).map(r=>r.daily_rev);
  const costs=F.filter(r=>r.total_cost).map(r=>r.total_cost);
  const margins=F.filter(r=>r.margin!=null).map(r=>r.margin);
  const avgRev=avg(revs); const avgCost=avg(costs); const avgMar=avg(margins);
  const pct=avgRev?Math.round(avgMar/avgRev*100):0;
  document.getElementById('st1').textContent=F.length;
  document.getElementById('st2').textContent=fc(avgRev);
  document.getElementById('st3').textContent=fc(avgCost);
  document.getElementById('st4').innerHTML=`<span class="${avgMar>=0?'pos':'neg'}">${fc(avgMar)}</span>`;
  document.getElementById('st5').innerHTML=`<span class="${pct>=0?'pos':'neg'}">${pct}%</span>`;

  if(!F.length){document.getElementById('out').innerHTML='<div style="text-align:center;padding:40px;color:#9aacbe">Нет данных</div>';return;}
  const byD={};F.forEach(r=>{if(!byD[r.date])byD[r.date]=[];byD[r.date].push(r);});
  let h='';
  Object.keys(byD).sort().forEach(dt=>{
    const rs=byD[dt];
    const dtRevs=rs.filter(r=>r.daily_rev).map(r=>r.daily_rev);
    const dtMargins=rs.filter(r=>r.margin!=null).map(r=>r.margin);
    const dtTotalRev=dtRevs.reduce((a,b)=>a+b,0);
    const dtTotalMar=dtMargins.reduce((a,b)=>a+b,0);
    const dtPct=dtTotalRev?Math.round(dtTotalMar/dtTotalRev*100):0;
    h+=`<div class="date-hdr">📅 ${fd(dt)}
      <span class="chips">
        <span class="chip cn">${rs.length} клиентов</span>
        <span class="chip cg">Выручка: ${dtTotalRev.toLocaleString('ru-RU')} ₸</span>
        <span class="chip ${dtPct>=0?'cg':'cr'}">Маржа: ${dtTotalMar.toLocaleString('ru-RU')} ₸ (${dtPct}%)</span>
      </span></div>
    <table><thead><tr>
      <th>#</th><th>Клиент</th>
      <th class="r">Выручка/день</th>
      <th class="r">Себест./день</th>
      <th class="r">Маржа/день</th>
      <th class="c">Маржа%</th>
      <th>Сделка (период / дней)</th>
      <th>Блюда</th>
      <th class="c">Ст.</th>
    </tr></thead><tbody>`;
    rs.forEach((r,i)=>{
      const cls=r.src==='Не найдено'?'tr-none':(i%2?'tr-odd':'tr-even');
      const marCls=r.margin==null?'':(r.margin>=0?'pos':'neg');
      const pbar=r.margin_pct!=null?`<div class="prog-wrap"><div class="prog-bar${r.margin_pct<0?' prog-neg':''}" style="width:${Math.min(Math.abs(r.margin_pct),100)}%"></div></div>`:'';
      const dishHtml=r.dishes.slice(0,5).map(d=>`<span>${d.name.replace('ПП* Упак ','').substring(0,38)} — ${d.cost.toLocaleString()}₸</span>`).join('')+(r.dishes.length>5?`<span style="color:#94a3b8">+ ещё ${r.dishes.length-5} блюд</span>`:'');
      const bcls=r.src==='Не найдено'?'bn':r.src.includes('точно')?'be':'bb';
      h+=`<tr class="${cls}">
        <td class="c" style="color:#aaa;font-size:10px">${i+1}</td>
        <td>${r.client}</td>
        <td class="r">${fc(r.daily_rev)}</td>
        <td class="r">${fc(r.total_cost)}</td>
        <td class="r"><span class="${marCls}">${fc(r.margin)}</span></td>
        <td class="c">${r.margin_pct!=null?`<span class="${marCls}">${r.margin_pct}%</span>${pbar}`:'—'}</td>
        <td style="font-size:11px;color:#475569">${r.period_text||'—'}&nbsp;/&nbsp;${r.days||'—'}д<br><span style="color:#94a3b8">${r.deal_sum?r.deal_sum.toLocaleString('ru-RU')+' ₸':'—'}</span></td>
        <td><details><summary>${r.dishes.length} блюд (${r.total_cost.toLocaleString()}₸)</summary><div class="dish-list">${dishHtml}</div></details></td>
        <td class="c"><span class="badge ${bcls}">${r.src.includes('точно')?'✓':r.src==='Не найдено'?'✗':'~'}</span></td>
      </tr>`;
    });
    h+=`</tbody></table>`;
  });
  document.getElementById('out').innerHTML=h;
}
function clr(){document.getElementById('si').value='';fdEl.value='';document.getElementById('fm').value='';render();}
document.getElementById('si').addEventListener('input',render);
fdEl.addEventListener('change',render);
document.getElementById('fm').addEventListener('change',render);
render();
</script>
</body></html>
