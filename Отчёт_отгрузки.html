      const cls=r.src==='Не найдено'?'tr-none':(i%2?'tr-odd':'tr-even');
      h+=`<tr class="${cls}"><td class="c" style="color:#aaa;font-size:10px">${i+1}</td>
<td>${r.name}</td>
<td style="color:#6b7c93;font-size:11px">${r.phone}</td>
<td class="c"><span class="rat">${r.ration||'—'}</span></td>
<td class="r">${fc(r.price)}</td>
<td class="c" style="font-size:11px;color:#64748b;max-width:130px">${r.period_text||'—'}</td>
<td class="c">${r.days!=null?r.days:'—'}</td>
<td class="r"><span class="dval">${fc(r.daily)}</span></td>
<td class="c"><span class="badge ${bc(r.src)}">${bt(r.src)}</span></td></tr>`;
    });
    h+=`</tbody></table>`;
  });
  document.getElementById('out').innerHTML=h;
}
function clr(){document.getElementById('si').value='';fdEl.value='';frEl.value='';document.getElementById('fs').value='';render();}
document.getElementById('si').addEventListener('input',render);
fdEl.addEventListener('change',render);frEl.addEventListener('change',render);
document.getElementById('fs').addEventListener('change',render);
render();
</script>
