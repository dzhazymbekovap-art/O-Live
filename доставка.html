<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olive — Доставка</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #eee; font-size: 14px; }

header {
  background: #1a3a2a;
  color: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 18px; }
header .info { font-size: 11px; opacity: 0.65; margin-top: 3px; }

.filters {
  background: #fff;
  padding: 10px 24px;
  border-bottom: 2px solid #ccc;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
}
.filters label { font-size: 13px; color: #444; display: flex; align-items: center; gap: 5px; }
.filters input, .filters select {
  padding: 6px 10px;
  border: 1px solid #bbb;
  border-radius: 4px;
  font-size: 13px;
}
.filters input[type=search] { width: 210px; }

.stats {
  background: #f9f9f9;
  padding: 8px 24px;
  border-bottom: 1px solid #ddd;
  font-size: 13px;
  color: #444;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
}
.stats b { color: #1a3a2a; font-size: 15px; }

.wrap { padding: 20px 24px; }

table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border: 2px solid #555;
}

thead th {
  background: #1a3a2a;
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid #2d5c40;
  white-space: nowrap;
}

tbody td {
  padding: 9px 12px;
  border: 1px solid #bbb;
  vertical-align: middle;
}

/* Чётные/нечётные строки */
tbody tr:nth-child(even) { background: #f7f7f7; }
tbody tr:nth-child(odd)  { background: #fff; }
tbody tr:hover { background: #e8f5ee; }

/* Разделитель между датами — толстая линия */
tbody tr.new-date td {
  border-top: 3px solid #1a3a2a;
}

.num { text-align: center; font-weight: 700; color: #1a3a2a; font-size: 15px; }
.date { white-space: nowrap; font-weight: 600; color: #333; font-size: 13px; }
.name { font-weight: 500; }
.phone { white-space: nowrap; color: #333; }
.addr { }
.time {
  white-space: nowrap;
  font-weight: 700;
  font-size: 13px;
  padding: 3px 8px;
  border-radius: 4px;
  display: inline-block;
}
.eve  { background: #ede0ff; color: #4a007a; }
.morn { background: #ddeeff; color: #00347a; }

.no-data { padding: 30px; text-align: center; color: #999; font-size: 15px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🥗 Olive — Доставка</h1>
    <div class="info">Архив доставок · данный с 06.06.26 · обновлено 07.06.2026</div>
  </div>
  <div style="text-align:right;font-size:13px">
    Записей: <b id="cnt" style="font-size:16px">—</b>
  </div>
</header>

<div class="stats" id="stats">...</div>

<div class="filters">
  <label>🔍
    <input type="search" id="q" placeholder="Имя или адрес..." oninput="render()">
  </label>
  <label>Дата:
    <select id="fDate" onchange="render()">
      <option value="">Все даты</option>
    </select>
  </label>
  <label>Время:
    <select id="fTime" onchange="render()">
      <option value="">Всё</option>
      <option value="20:">Вечер 20:00</option>
      <option value="6:">Утро 6:00</option>
    </select>
  </label>
</div>

<div class="wrap" id="wrap"></div>

  {num:"3", date:"07.06.26", name:"Екатерина 2228 / 1500ккал Продление", phone:"+77770782228",       addr:"Ул. Котельникова 95, 2 этаж, всё здание",                 time:"6:00-9:00",   src:"route", cost:1500},

function e(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildDates(){
  const dates = [...new Set(DATA.map(r=>r.date))].sort();
  const sel = document.getElementById('fDate');
  dates.forEach(d => {
    const o = document.createElement('option');
    o.value = d; o.textContent = d;
    sel.appendChild(o);
  });
}

function filtered(){
  const q  = document.getElementById('q').value.toLowerCase();
  const fd = document.getElementById('fDate').value;
  const ft = document.getElementById('fTime').value;
  return DATA.filter(r => {
    if(q  && !r.name.toLowerCase().includes(q) && !r.addr.toLowerCase().includes(q) && !r.phone.includes(q)) return false;
    if(fd && r.date !== fd) return false;
    if(ft && !r.time.includes(ft)) return false;
    return true;
  });
}

function render(){
  const rows = filtered();
  document.getElementById('cnt').textContent = rows.length;

  const care  = rows.filter(r=>r.src==='care').length;
  const route = rows.filter(r=>r.src==='route').length;
  const eve   = rows.filter(r=>r.time.startsWith('20')).length;
  const dates = [...new Set(rows.map(r=>r.date))].sort();

  document.getElementById('stats').innerHTML =
    `<span>Служба заботы: <b>${care}</b></span>` +
    `<span>Маршрутный лист: <b>${route}</b></span>` +
    `<span>Вечерних: <b>${eve}</b></span>` +
    `<span>Утренних: <b>${rows.length - eve}</b></span>` +
    `<span style="margin-left:auto;color:#999;font-size:12px">Дат в выборке: ${dates.join(', ')}</span>`;

  if(!rows.length){
    document.getElementById('wrap').innerHTML = '<div class="no-data">Нет данных</div>';
    return;
  }

  let html = `<table>
    <thead><tr>
      <th style="width:42px">№</th>
      <th style="width:88px">Дата</th>
      <th>ФИО клиента</th>
      <th style="width:160px">Телефон</th>
      <th>Адрес</th>
      <th style="width:120px">Время</th>
      <th style="width:140px">Стоимость доставки</th>
    </tr></thead><tbody>`;

  let prevDate = null;
  rows.forEach(r => {
    const isNewDate = r.date !== prevDate;
    const rowClass  = isNewDate ? 'new-date' : '';
    const tc = r.time.startsWith('20') ? 'eve' : 'morn';
    let costHtml = '';
    if (!r.addr) {
      costHtml = '<span style="color:#bbb;font-size:12px">—</span>';
    } else if (r.cost === 'undef') {
      costHtml = '<span style="background:#fff3cd;color:#856404;padding:2px 7px;border-radius:4px;font-size:12px">⚠️ Уточнить</span>';
    } else {
      const bg = r.cost === 1000 ? '#d4edda' : '#f8d7da';
      const col = r.cost === 1000 ? '#1a5c30' : '#7a0000';
      costHtml = `<span style="background:${bg};color:${col};padding:3px 10px;border-radius:4px;font-weight:700">${r.cost} тг</span>`;
    }
    html += `<tr class="${rowClass}">
      <td class="num">${e(r.num)}</td>
      <td class="date">${e(r.date)}</td>
      <td class="name">${e(r.name)}</td>
      <td class="phone">${e(r.phone)}</td>
      <td class="addr">${e(r.addr)}</td>
      <td><span class="time ${tc}">${e(r.time)}</span></td>
      <td style="text-align:center">${costHtml}</td>
    </tr>`;
    prevDate = r.date;
  });

  html += '</tbody></table>';
  document.getElementById('wrap').innerHTML = html;
}

buildDates();
render();
</script>

</html>
