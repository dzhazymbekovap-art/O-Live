*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:24px}
.wrap{max-width:1100px;margin:0 auto}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.hdr h1{font-size:20px;font-weight:600}
.hdr span{font-size:13px;color:#666}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
.card{background:#fff;border-radius:10px;padding:.85rem 1rem;border:1px solid #eee}
.card .lbl{font-size:12px;color:#888;margin-bottom:4px}
.card .val{font-size:22px;font-weight:600;color:#1a1a1a}
.card .sub{font-size:11px;color:#aaa;margin-top:2px}
.card.total .val{color:#1d9e75}
.b12{background:#e1f5ee;color:#0f6e56}
.b15{background:#dbeafe;color:#1e40af}
.b18{background:#fef3c7;color:#92400e}
.b25{background:#fce7f3;color:#9d174d}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.filters input,.filters select{border:1px solid #ddd;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;background:#fff}
.filters input{flex:1;min-width:180px}
.tbl-wrap{background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead tr{background:#f9f9f9}
th{padding:10px 12px;text-align:left;font-weight:600;color:#555;font-size:12px;border-bottom:1px solid #eee}
th:nth-child(1){width:26%}th:nth-child(2){width:14%}th:nth-child(3){width:9%}th:nth-child(4){width:12%;text-align:right}th:nth-child(5){width:39%}
td{padding:9px 12px;border-bottom:1px solid #f0f0f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fafafa}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.amount{text-align:right;font-weight:600}
.time{font-size:12px;color:#666}
.footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#f9f9f9;border-top:1px solid #eee;font-size:12px;color:#666}
.footer strong{color:#1a1a1a;font-weight:600}
.no-results{text-align:center;padding:2rem;color:#999;font-size:13px}
</style>
</head>
<body>

  <div class="filters">

    <select id="ration" onchange="filter()">

      <option value="2500">2500 ккал</option>
    </select>
    <select id="time" onchange="filter()">
      <option value="">Всё время</option>
      <option value="вечер">Вечер 20:00–22:00</option>
      <option value="утро">Утро 6:00–9:00</option>
    </select>
  </div>
  <div class="tbl-wrap">
    <table>

    </div>
  </div>
</div>

function badgeClass(k){return k===1200?'b12':k===1500?'b15':k===1800?'b18':'b25';}
function fmt(n){return n.toLocaleString('ru-RU');}
function render(data){
  const tbody=document.getElementById('tbody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="5" class="no-results">Ничего не найдено</td></tr>';updateCards(data);return;}
  tbody.innerHTML=data.map(c=>`<tr><td title="${c.name}">${c.name}</td><td style="font-size:12px;color:#888">${c.phone}</td><td><span class="badge ${badgeClass(c.kcal)}">${c.kcal}</span></td><td class="amount">${fmt(c.amount)}</td><td class="time" title="${c.addr}">${c.time==='вечер'?'🌙 20:00–22:00':'🌅 6:00–9:00'} · ${c.addr}</td></tr>`).join('');
  const total=data.reduce((s,c)=>s+c.amount,0);
  document.getElementById('shown').textContent=data.length;
  document.getElementById('footerSum').textContent=fmt(total)+' ₸';
  updateCards(data);
}
function updateCards(data){
  const counts={1200:0,1500:0,1800:0,2500:0};let sum=0;
  data.forEach(c=>{counts[c.kcal]=(counts[c.kcal]||0)+1;sum+=c.amount;});
  document.getElementById('c12').textContent=counts[1200];
  document.getElementById('c15').textContent=counts[1500];
  document.getElementById('c18').textContent=counts[1800];
  document.getElementById('c25').textContent=counts[2500];
  document.getElementById('totalSum').textContent=fmt(sum)+' ₸';
  document.getElementById('totalCount').textContent=data.length+' клиентов';
}
function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const r=document.getElementById('ration').value;
  const t=document.getElementById('time').value;
  render(clients.filter(c=>{
    if(q&&!c.name.toLowerCase().includes(q)&&!c.phone.includes(q))return false;
    if(r&&String(c.kcal)!==r)return false;
    if(t&&c.time!==t)return false;
    return true;
  }));
}
render(clients);
</script>

</html>
