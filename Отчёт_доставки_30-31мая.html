<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<title>Отчёт по стоимости доставки — вечер 30.05 – утро 31.05 · O-Live</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#edf0f4;padding:20px 14px;color:#1a1a1a}
.wrap{max-width:980px;margin:0 auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.10);margin-bottom:20px;font-size:13px}
tr.title-row td{background:#2c3e50;color:#fff;font-size:15px;font-weight:700;padding:13px 16px;text-align:center}
thead th{background:#1f7a4d;color:#fff;font-size:12px;font-weight:600;padding:10px 14px;text-align:left;letter-spacing:.04em}
thead th.num{width:44px;text-align:center}
thead th.cost{width:130px;text-align:center}
thead th.zone{width:160px}
thead th.note{width:120px}
tr.sec-row td{background:#34495e;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;letter-spacing:.06em}
td{padding:9px 14px;border-bottom:1px solid #ececec;vertical-align:middle}
td.num{text-align:center;color:#777;font-size:12px}
td.addr{color:#555;font-size:12px}
td.zone{font-size:12px;white-space:nowrap}
td.cost{text-align:center;font-weight:700}
td.note{font-size:11px;color:#e67e22;font-style:italic}
tr:last-child td{border-bottom:none}
tr.red td{background:#fadbd8}
tr.red td.cost{color:#c0392b}
tr.ext td{background:#fdebd0}
tr.ext td.cost{color:#e67e22}
tr.red:hover td{background:#f5c6c0}
tr.ext:hover td{background:#fad7aa}
.summary{background:#fff;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.10);overflow:hidden}
.sum-title{background:#2c3e50;color:#fff;font-weight:700;font-size:13px;padding:10px 16px}
.sum-body{display:flex}
.sum-block{flex:1;padding:16px 20px;text-align:center;border-right:1px solid #eee}
.sum-block:last-child{border-right:none}
.sum-lbl{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sum-val{font-size:24px;font-weight:800}
.sum-det{font-size:11px;color:#aaa;margin-top:3px}
.red-val{color:#c0392b}.ext-val{color:#e67e22}.tot-val{color:#1f7a4d}
</style></head>
